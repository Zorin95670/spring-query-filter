name: Align version with Spring Boot

# Triggered when Dependabot opens/updates a PR on the Spring Boot BOM
on:
  pull_request:
    branches: [main]
    paths:
      - "pom.xml"

permissions:
  contents: write
  pull-requests: write

jobs:
  align-version:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Align project version and Java version
        id: align
        run: |
          python3 .github/scripts/align_spring_version.py pom.xml .github/spring-java-compat.yml

      - name: Check for changes
        id: git_check
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit changes
        if: steps.git_check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pom.xml
          git commit -m "chore: align library version to Spring Boot ${{ steps.align.outputs.new_version }}"
          git push

      - name: Comment on PR — Java bumped
        if: steps.align.outputs.java_bumped == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🔧 \`java.version\` was automatically bumped to **${{ steps.align.outputs.new_java }}** to stay compatible with Spring Boot **${{ steps.align.outputs.new_version }}**.`
            })

      - name: Comment on PR — unknown compatibility mapping
        if: steps.align.outputs.compat_unknown == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `⚠️ Spring Boot version **${{ steps.align.outputs.new_version }}** is not (yet) present in \`.github/spring-java-compat.yml\`. The project version was aligned, but please manually verify the minimum Java compatibility and update the mapping before merging.`
            })